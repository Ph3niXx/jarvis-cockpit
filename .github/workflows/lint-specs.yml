name: Lint specs produit

on:
  push:
    paths:
      - 'docs/specs/**'
      - 'scripts/lint_specs_produit.py'
      - '.github/workflows/lint-specs.yml'
  pull_request:
    paths:
      - 'docs/specs/**'
      - 'scripts/lint_specs_produit.py'
      - '.github/workflows/lint-specs.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lint sections Fonctionnalités + Parcours utilisateur (bloquant)
        # La règle éditoriale "vocabulaire produit" doit rester dure sur
        # les deux sections : zéro chemin code, composant JSX, prop, colonne
        # DB, endpoint, jargon infra (Tier 1/2, bootTier, loadPanel,
        # localStorage technique, hooks React). Voir CLAUDE.md §§ "Règle
        # éditoriale section Fonctionnalités" et "Règle éditoriale section
        # Parcours utilisateur". Si cette étape fail, réécris la section
        # concernée avant de merger.
        run: python scripts/lint_specs_produit.py
