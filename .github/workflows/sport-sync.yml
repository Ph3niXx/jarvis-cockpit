name: Sport — RSS Sync

on:
  schedule:
    # Quotidien à 6h30 UTC (8h30 Paris), après le pipeline IA
    - cron: '30 6 * * *'
  workflow_dispatch:

jobs:
  sport-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r pipelines/requirements-sport.txt

      - name: Run sport sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python pipelines/sport_sync.py
