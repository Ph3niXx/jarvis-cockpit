name: TFT Tracker — Match Sync

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  tft-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run TFT pipeline
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RIOT_PUUID: ${{ secrets.RIOT_PUUID }}
          USER_ID: ${{ secrets.SUPABASE_USER_ID }}
        run: python tft_pipeline.py
