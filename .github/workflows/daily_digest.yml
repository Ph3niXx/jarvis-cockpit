name: AI Daily Digest

on:
  schedule:
    # Tous les matins à 7h00 heure de Paris (= 6h00 UTC en hiver, 5h00 UTC en été)
    # On met 6h UTC pour couvrir les deux saisons
    - cron: '0 6 * * 1-5'   # Lundi → Vendredi
    # Décommente la ligne ci-dessous si tu veux aussi le week-end :
    # - cron: '0 7 * * 6,0'
  workflow_dispatch:          # Permet de lancer manuellement depuis GitHub

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI Digest
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS:     ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:   ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py
