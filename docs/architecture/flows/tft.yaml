  - name: tft_match_traits
    write: true
  - name: tft_match_lobby
    write: true
    detail: "7 adversaires dénormalisés par match (main_traits + main_carry pré-calculés)"
  - name: tft_rank_history
    write: true
    detail: "Snapshot quotidien rank ranked (tier, rank, LP, wins, losses)"

panels:
  - id: gaming
    detail: "Profil Riot TFT live + card TFT ongoing dans §1 En cours + compteur TFT dans §8 Milestones"
